version: "3.8"

services:
  backend:
    build: ./backend
    container_name: api-sentinel-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-60}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: api-sentinel-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
