name: API Sentinel Check

on:
  schedule:
    - cron: "0 * * * *"   # every hour / 每小时
  workflow_dispatch:       # manual trigger / 手动触发

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies / 安装依赖
        run: pip install httpx

      - name: Run check / 执行检查
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          OPENAI_KEY:   ${{ secrets.OPENAI_KEY }}
          CLAUDE_KEY:   ${{ secrets.CLAUDE_KEY }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          EMAIL_USER:   ${{ secrets.EMAIL_USER }}
          EMAIL_AUTH:   ${{ secrets.EMAIL_AUTH }}
          EMAIL_TO:     ${{ secrets.EMAIL_TO }}
          SMTP_HOST:    ${{ secrets.SMTP_HOST }}
          SMTP_PORT:    ${{ secrets.SMTP_PORT }}
          ALERT_L1_DAYS: ${{ secrets.ALERT_L1_DAYS }}
          ALERT_L2_DAYS: ${{ secrets.ALERT_L2_DAYS }}
          ALERT_L3_DAYS: ${{ secrets.ALERT_L3_DAYS }}
        run: python scripts/standalone.py

      - name: Commit updated data / 提交数据更新
        run: |
          git config user.name "api-sentinel-bot"
          git config user.email "bot@api-sentinel.dev"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "[auto] update usage data"
          git push
